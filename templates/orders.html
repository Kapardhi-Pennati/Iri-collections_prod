{% extends 'base.html' %}

{% block title %}ORDERS | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container" style="max-width: 900px;">
        <!-- 🏷️ HEADER -->
        <div style="margin-bottom: 50px; border-bottom: var(--border-width) solid #000; padding-bottom: 20px;">
            <h1 style="font-size: 3.5rem; margin: 0;">PURCHASES</h1>
        </div>

        <div id="orders-list">
            <div style="text-align: center; padding: 100px; font-weight: 800;">COLLECTING HISTORY...</div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
async function loadOrders() {
    if (!API.isLoggedIn()) { window.location.href = '/login/'; return; }
    try {
        const data = await API.get('/store/orders/');
        const container = document.getElementById('orders-list');
        if (!data || !data.results || data.results.length === 0) {
            container.innerHTML = `
                <div class="brutalist-card" style="padding: 100px; text-align: center;">
                    <h3 style="font-size: 2.5rem; margin-bottom: 20px;">NO HISTORY.</h3>
                    <p style="font-weight: 700;">YOUR COLLECTION JOURNEY HASN'T STARTED YET.</p>
                    <a href="/catalog/" class="brutalist-btn" style="margin-top: 30px;">START SHOPPING</a>
                </div>`;
            return;
        }

        container.innerHTML = data.results.map(order => {
            const date = new Date(order.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }).toUpperCase();
            const itemsList = order.items.map(i => `
                <div style="display:flex; justify-content:space-between; padding:8px 0; font-weight: 700; font-size: 0.9rem;">
                    <span>${i.product_name.toUpperCase()} (x${i.quantity})</span>
                    <span>${formatPrice(i.subtotal)}</span>
                </div>
            `).join('');

            return `
                <div class="brutalist-card" style="margin-bottom: 40px; padding: 30px; background: #fff;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 4px solid #000; padding-bottom: 15px;">
                        <div>
                            <div style="font-weight: 800; font-size: 1.5rem; color: var(--gold-light);">${order.order_number}</div>
                            <div style="font-weight: 800; font-size: 0.8rem; color: #666;">${date}</div>
                        </div>
                        <div class="brutalist-card" style="background: #000; color: #fff; padding: 5px 15px; font-weight: 800; font-size: 0.7rem; box-shadow: 3px 3px 0 0 #000;">
                            ${order.status.toUpperCase()}
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 25px;">
                        ${itemsList}
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: flex-end; padding-top: 20px; border-top: 2px solid #000;">
                        <div>
                            <div style="font-weight: 800; font-size: 1.2rem;">TOTAL: ${formatPrice(order.total_amount)}</div>
                            ${parseFloat(order.shipping_fee) > 0 ? `<div style="font-weight: 700; font-size: 0.7rem; color: #666;">INCL. ${formatPrice(order.shipping_fee)} SHIPPING</div>` : ''}
                        </div>
                        <a href="/invoice/${order.id}/" target="_blank" class="brutalist-btn" style="background: #fff; font-size: 0.8rem; padding: 8px 15px;">PRINT INVOICE</a>
                    </div>
                </div>
            `;
        }).join('');
    } catch (err) {
        console.error(err);
    }
}
document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
