{% extends 'base.html' %}

{% block title %}My Orders — Iri Collections{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width:900px;">
        <div class="section-header">
            <h1 style="font-family: var(--font-display); font-size: 2.2rem;">My <span class="text-gold">Orders</span></h1>
            <div class="section-divider"></div>
        </div>
        <div id="orders-list">
            <div class="page-loader"><div class="spinner"></div></div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
async function loadOrders() {
    if (!API.isLoggedIn()) {
        window.location.href = '/login/';
        return;
    }
    try {
        const data = await API.get('/store/orders/');
        const container = document.getElementById('orders-list');
        if (!data || !data.results || data.results.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="ph ph-package"></i></div>
                    <h3>No orders yet</h3>
                    <p>Start shopping to see your orders here</p>
                    <a href="/catalog/" class="btn btn-primary mt-2">Browse Products</a>
                </div>`;
            return;
        }
        container.innerHTML = data.results.map(order => {
            const itemsList = order.items.map(i =>
                `<div style="display:flex; justify-content:space-between; padding:0.4rem 0; font-size:0.9rem;">
                    <span>${escapeHTML(i.product_name)} × ${i.quantity}</span>
                    <span>${formatPrice(i.subtotal)}</span>
                </div>`
            ).join('');

            const date = new Date(order.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });

            return `
                <div class="order-card fade-in">
                    <div class="order-header">
                        <div>
                            <div class="order-number">${escapeHTML(order.order_number)}</div>
                            <div style="font-size:0.85rem; color:var(--text-muted);">${date}</div>
                        </div>
                        <span class="order-status ${order.status}">${order.status}</span>
                    </div>
                    ${itemsList}
                    ${order.tracking_image ? `
                    <div style="margin-top:var(--space-md);">
                        <div style="font-size:0.85rem; font-weight:600; margin-bottom:0.5rem; color:var(--text-muted); text-transform:uppercase;">Tracking Proof</div>
                        <img src="${order.tracking_image}" alt="Tracking" style="max-width:120px; display:block; border-radius: var(--radius-sm); border:1px solid var(--border); cursor:pointer;" onclick="window.open('${order.tracking_image}', '_blank')">
                    </div>
                    ` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:var(--space-md); padding-top:var(--space-md); border-top:1px solid var(--border); font-weight:700;">
                        <div>
                            <span>Total:</span>
                            <span style="color:var(--gold-light); margin-left:10px;">${formatPrice(order.total_amount)}</span>
                            ${parseFloat(order.shipping_fee) > 0 ? `<div style="font-size: 0.8rem; color: var(--text-muted); font-weight: normal;">(incl. ${formatPrice(order.shipping_fee)} shipping)</div>` : ''}
                        </div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <a href="/invoice/${order.id}/" target="_blank" class="btn btn-sm btn-ghost" style="text-decoration:none;"><i class="ph ph-printer"></i> Print Bill</a>
                        </div>
                    </div>
                    ${order.transaction ? `
                    <div style="margin-top:var(--space-sm); font-size:0.8rem; color:var(--text-muted);">
                        UTR / Reference: ${escapeHTML(order.transaction.upi_reference_id || 'Not provided')}
                        <span style="margin-left: 10px;">Payment Status:</span> <span class="order-status ${order.transaction.status}">${order.transaction.status}</span>
                    </div>` : ''}
                </div>`;
        }).join('');
    } catch (err) {
        console.error(err);
    }
}

document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
