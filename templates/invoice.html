<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - Iri Collections</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAF8;
            --bg-elevated: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #7A7A7A;
            --border: #1A1A1A;
            --border-light: #E0E0E0;
            --accent: #E8DCC8;
            --font-display: 'Archivo', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background: var(--bg);
            margin: 0;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .invoice-container {
            max-width: 780px;
            margin: 0 auto;
            background: var(--bg-elevated);
            padding: 48px;
            border: 3px solid var(--border);
            box-shadow: 4px 4px 0 0 var(--border);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 3px solid var(--border);
        }

        .brand {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .company-info {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 8px;
            line-height: 1.6;
            font-weight: 500;
        }

        .invoice-meta {
            text-align: right;
        }

        .invoice-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            color: var(--border-light);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
        }

        .meta-group {
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .meta-label {
            font-weight: 600;
            color: var(--text-muted);
            margin-right: 8px;
        }

        .billing-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 36px;
        }

        .billing-block {
            width: 45%;
        }

        .billing-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
        }

        .billing-details {
            color: var(--text);
            font-weight: 500;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 36px;
        }

        th {
            text-align: left;
            padding: 12px 14px;
            border-bottom: 3px solid var(--border);
            color: var(--text-muted);
            font-family: var(--font-display);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.06em;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border-light);
            font-weight: 500;
        }

        .col-qty, .col-price, .col-total { text-align: right; }
        th.col-qty, th.col-price, th.col-total { text-align: right; }

        .item-name {
            font-weight: 600;
        }

        .totals-section {
            display: flex;
            justify-content: flex-end;
        }

        .totals-table {
            width: 320px;
            border: none;
        }

        .totals-table td {
            padding: 8px 14px;
            border: none;
            text-align: right;
        }

        .totals-table .label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .row-total td {
            font-size: 1.2rem;
            font-weight: 800;
            font-family: var(--font-display);
            border-top: 3px solid var(--border) !important;
            padding-top: 14px !important;
        }

        .footer {
            margin-top: 48px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding-top: 16px;
            border-top: 2px solid var(--border-light);
            font-weight: 500;
        }

        .inv-badge {
            display: inline-block;
            padding: 3px 10px;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border: 2px solid var(--border);
        }

        .inv-badge.paid { background: #D8F3DC; color: #2D6A4F; border-color: #2D6A4F; }
        .inv-badge.pending { background: #FEFAE0; color: #BC6C25; border-color: #BC6C25; }

        .btn-print {
            display: block;
            margin: 0 auto 24px auto;
            padding: 10px 28px;
            background: var(--text);
            color: var(--bg);
            border: 3px solid var(--border);
            box-shadow: 4px 4px 0 0 var(--border);
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .btn-print:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 0 var(--border);
        }

        .btn-print:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 0 var(--border);
        }

        @media print {
            body { background: none; padding: 0; }
            .invoice-container { box-shadow: none; border: none; padding: 0; }
            .btn-print { display: none; }
        }
    </style>
</head>
<body>

    <button class="btn-print" onclick="window.print()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; margin-right:6px;"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
        Print Invoice
    </button>

    <div class="invoice-container" id="invoice">
        <div style="text-align: center; padding: 48px;">
            <p style="color: var(--text-muted); font-weight: 500;">Loading invoice details...</p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParts = window.location.pathname.split('/');
            const orderIdStr = urlParts[urlParts.length - 2]; 
            const orderId = parseInt(orderIdStr);

            if (!orderId || isNaN(orderId)) {
                document.getElementById('invoice').innerHTML = '<p style="text-align:center; color:var(--error); padding:48px;">Invalid Order ID</p>';
                return;
            }

            // Wait for user session to be verified
            const user = await API.bootstrapUser();
            if (!user) {
                window.location.href = '/login/?next=' + window.location.pathname;
                return;
            }

            try {
                // Fetch order details — try customer endpoint first, admin endpoint as fallback
                let order;
                try {
                    order = await API.get(`/store/orders/${orderId}/`);
                } catch {
                    // If customer endpoint fails (e.g., admin viewing another user's order), try admin
                    order = await API.get(`/store/admin/orders/${orderId}/`);
                }
                
                if (!order) throw new Error('Order not found');

                const date = new Date(order.created_at).toLocaleDateString('en-IN', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });

                const isPaid = order.transaction && order.transaction.status === 'paid';
                const statusBadge = isPaid ? '<span class="inv-badge paid">PAID</span>' : '<span class="inv-badge pending">UNPAID</span>';

                const html = `
                    <div class="header">
                        <div>
                            <h1 class="brand">Iri Collections</h1>
                            <div class="company-info">
                                No.86, MG Road, Manapakkam<br>
                                Chennai, Tamil Nadu 600125<br>
                                +91 93611 51712<br>
                            </div>
                        </div>
                        <div class="invoice-meta">
                            <h2 class="invoice-title">INVOICE</h2>
                            <div class="meta-group"><span class="meta-label">Invoice / Order #</span> ${escapeHTML(order.order_number)}</div>
                            <div class="meta-group"><span class="meta-label">Date</span> ${date}</div>
                            <div class="meta-group"><span class="meta-label">Payment Status</span> ${statusBadge}</div>
                            ${order.tracking_image ? `<div class="meta-group"><span class="meta-label">Tracking</span> <a href="${order.tracking_image}" target="_blank" style="font-weight:600; text-decoration:underline;">View Proof</a></div>` : ''}
                        </div>
                    </div>

                    <div class="billing-section">
                        <div class="billing-block">
                            <h3 class="billing-title">Billed To</h3>
                            <div class="billing-details">
                                <strong>Customer</strong><br>
                                ${escapeHTML(order.shipping_address).replace(/\n/g, '<br>')}<br>
                                Phone: ${escapeHTML(order.phone) || 'N/A'}
                            </div>
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Item Description</th>
                                <th class="col-price">Price</th>
                                <th class="col-qty">Quantity</th>
                                <th class="col-total">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${order.items.map(item => `
                                <tr>
                                    <td>
                                        <div class="item-name">${escapeHTML(item.product_name)}</div>
                                    </td>
                                    <td class="col-price">${formatPrice(item.price_at_purchase)}</td>
                                    <td class="col-qty">${item.quantity}</td>
                                    <td class="col-total">${formatPrice(item.subtotal)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>

                    <div class="totals-section">
                        <table class="totals-table">
                            <tr>
                                <td class="label">Subtotal</td>
                                <td>${formatPrice(order.total_amount - (order.shipping_fee || 0))}</td>
                            </tr>
                            ${order.shipping_fee > 0 ? `
                            <tr>
                                <td class="label">Shipping Fee</td>
                                <td>${formatPrice(order.shipping_fee)}</td>
                            </tr>
                            ` : ''}
                            <tr class="row-total">
                                <td class="label">Total Amount</td>
                                <td>${formatPrice(order.total_amount)}</td>
                            </tr>
                        </table>
                    </div>

                    <div class="footer">
                        <p style="font-weight: 600; color: var(--text);">POLICY: No returns, refunds or exchanges. All products that are sold are final.</p>
                        <p>Thank you for choosing Iri Collections. For any queries regarding this invoice, please contact support.</p>
                        <p style="margin-top:4px; font-weight:500; color:#bbb;">This is a computer generated invoice and does not require a physical signature.</p>
                    </div>
                `;

                document.getElementById('invoice').innerHTML = html;

                // Auto-trigger print after rendering
                setTimeout(() => {
                    window.print();
                }, 500);

            } catch (error) {
                console.error(error);
                document.getElementById('invoice').innerHTML = '<div style="text-align:center; padding:48px;"><h3 style="font-family:var(--font-display); font-weight:700;">Error loading invoice</h3><p style="color:var(--text-muted);">Could not fetch order data or you do not have permission.</p></div>';
            }
        });
    </script>
</body>
</html>
