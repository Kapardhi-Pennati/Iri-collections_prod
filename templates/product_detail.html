{% extends 'base.html' %}
{% load static %}

{% block title %}Product — Iri Collections{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div id="product-detail-content">
            <div class="page-loader"><div class="spinner"></div></div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let productData = null;
let selectedQuantity = 1;

async function loadProduct() {
    const slug = window.location.pathname.split('/product/')[1].replace('/', '');
    try {
        const product = await API.get(`/store/products/${slug}/`);
        if (!product || product.detail) {
            document.getElementById('product-detail-content').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm-8-80V80a8,8,0,0,1,16,0v56a8,8,0,0,1-16,0Zm20,36a12,12,0,1,1-12-12A12,12,0,0,1,140,168Z"></path></svg></div>
                    <h3>Product not found</h3>
                    <p><a href="/catalog/" class="btn btn-secondary mt-1">Back to Shop</a></p>
                </div>`;
            return;
        }
        productData = product;
        document.title = `${product.name} — Iri Collections`;
        renderProduct(product);
    } catch (err) {
        console.error(err);
    }
}

function renderProduct(p) {
    const discount = p.compare_price ? Math.round((1 - p.price / p.compare_price) * 100) : 0;
    const imgSrc = p.display_image || p.image_url || p.image || '';

    let stockClass = 'in-stock', stockText = `In Stock (${p.stock} available)`;
    if (p.stock === 0) { stockClass = 'out-of-stock'; stockText = 'Out of Stock'; }
    else if (p.stock <= 5) { stockClass = 'low-stock'; stockText = `Only ${p.stock} left`; }

    const isInWishlist = window.wishlistItems ? window.wishlistItems.has(p.id) : false;
    const heartIcon = isInWishlist 
        ? '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="var(--gold)" viewBox="0 0 256 256"><path d="M240,94c0,70-103.79,126.66-108.21,129a8,8,0,0,1-7.58,0C119.79,220.66,16,164,16,94A62.07,62.07,0,0,1,78,32c20.65,0,38.73,8.88,50,23.89C139.27,40.88,157.35,32,178,32A62.07,62.07,0,0,1,240,94Z"></path></svg>' 
        : '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256"><path d="M178,40c-20.65,0-38.73,8.88-50,23.89C116.73,48.88,98.65,40,78,40a54.06,54.06,0,0,0-54,54c0,101.07,98.14,154.62,102.33,156.83a8.14,8.14,0,0,0,7.34,0C137.86,248.62,236,195.07,236,94A54.06,54.06,0,0,0,178,40ZM128,234.33C116.51,228.16,40,183,40,94A38,38,0,0,1,78,56c18.57,0,34.05,10.63,40.16,27.5a8,8,0,0,0,15.68,0C139.95,66.63,155.43,56,174,56a38,38,0,0,1,38,38C212,183,135.49,228.16,128,234.33Z"></path></svg>';

    document.getElementById('product-detail-content').innerHTML = `
        <div class="product-detail fade-in">
            <div class="product-detail-image">
                <img src="${imgSrc}" alt="${p.name}">
            </div>
            <div class="product-detail-info">
                <a href="/catalog/?category=${p.category_name?.toLowerCase() || ''}" 
                   style="font-size:0.8rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold); margin-bottom:var(--space-sm); display:inline-block;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256" style="display:inline-block; vertical-align:middle; margin-right:4px;"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg> ${p.category_name || 'Shop'}
                </a>
                <h1>${p.name}</h1>
                <div class="product-detail-price">
                    ${formatPrice(p.price)}
                    ${p.compare_price ? `<span class="original">${formatPrice(p.compare_price)}</span>` : ''}
                    ${discount > 0 ? `<span style="font-size:0.9rem; color:var(--success); margin-left:0.5rem;">${discount}% off</span>` : ''}
                </div>
                <span class="stock-badge ${stockClass}"><svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" fill="currentColor" viewBox="0 0 256 256" style="display:inline-block; vertical-align:middle; margin-right:4px;"><path d="M232,128A104,104,0,1,1,128,24,104.11,104.11,0,0,1,232,128Z"></path></svg> ${stockText}</span>

                <div class="product-meta">
                    ${p.material ? `<div class="product-meta-item"><div class="label">Material</div><div>${p.material}</div></div>` : ''}
                    ${p.weight ? `<div class="product-meta-item"><div class="label">Weight</div><div>${p.weight}</div></div>` : ''}
                    <div class="product-meta-item"><div class="label">Category</div><div>${p.category_name}</div></div>
                    <div class="product-meta-item"><div class="label">SKU</div><div>IRI-${String(p.id).padStart(4, '0')}</div></div>
                </div>

                <p class="product-detail-description">${p.description}</p>

                ${p.stock > 0 ? `
                <div class="quantity-control">
                    <button onclick="changeQty(-1)"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H40a8,8,0,0,1,0-16H216A8,8,0,0,1,224,128Z"></path></svg></button>
                    <input type="number" id="qty-input" value="1" min="1" max="${p.stock}" readonly>
                    <button onclick="changeQty(1)"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"></path></svg></button>
                </div>
                <div style="display:flex; gap:var(--space-md);">
                    <button class="btn btn-primary btn-lg" onclick="addToCartDetail()" style="flex:1;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256" style="display:inline-block; vertical-align:middle; margin-right:8px;"><path d="M222.14,105.85l-17.6,96.81A15.94,15.94,0,0,1,188.87,216H73.5a15.94,15.94,0,0,1-15.67-13.34L35.2,80H24a8,8,0,0,1,0-16H40a8,8,0,0,1,7.84,6.43L52.51,96H232a8,8,0,0,1,7.84,9.57Zm-161.47,94.15H188.87l14.54-80H55.13ZM96,232a16,16,0,1,0,16,16A16,16,0,0,0,96,232Zm80,0a16,16,0,1,0,16,16A16,16,0,0,0,176,232Z"></path></svg> Add to Cart
                    </button>
                    <div style="margin-top: 1.5rem; padding: 12px; background: rgba(184, 142, 47, 0.08); border-radius: 6px; font-size: 0.85rem; color: var(--gold-light); line-height: 1.5;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256" style="display:inline-block; vertical-align:middle; margin-right:6px; color: var(--gold);"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm-8-80V80a8,8,0,0,1,16,0v56a8,8,0,0,1-16,0Zm20,36a12,12,0,1,1-12-12A12,12,0,0,1,140,168Z"></path></svg>
                        <strong>Policy:</strong> No returns, refunds or exchanges. All sales are final.
                    </div>
                    <button class="wishlist-btn" onclick="toggleWishlist(${p.id})" id="btn-wishlist-${p.id}" style="font-size: 1.5rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; width: 50px; cursor: pointer; color: var(--gold);">${heartIcon}</button>
                    <button class="btn btn-secondary btn-lg" onclick="buyNow()">
                        Buy Now
                    </button>
                </div>
                ` : `
                <div style="display:flex; gap:var(--space-md);">
                    <button class="btn btn-primary btn-lg btn-block" disabled style="flex:1;">Out of Stock</button>
                    <button class="wishlist-btn" onclick="toggleWishlist(${p.id})" id="btn-wishlist-${p.id}" style="font-size: 1.5rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; width: 50px; cursor: pointer; color: var(--gold);">${heartIcon}</button>
                </div>
                `}
            </div>
        </div>
    `;
}

function changeQty(delta) {
    const inp = document.getElementById('qty-input');
    let val = parseInt(inp.value) + delta;
    if (val < 1) val = 1;
    if (val > productData.stock) val = productData.stock;
    inp.value = val;
    selectedQuantity = val;
}

async function addToCartDetail() {
    await addToCart(productData.id, selectedQuantity);
}

async function buyNow() {
    if (!API.isLoggedIn()) {
        Toast.info('Please login to purchase');
        setTimeout(() => window.location.href = '/login/', 1000);
        return;
    }
    await addToCart(productData.id, selectedQuantity);
    window.location.href = '/checkout/';
}

document.addEventListener('DOMContentLoaded', loadProduct);
</script>
{% endblock %}
