{% extends 'base.html' %}
{% load static %}

{% block title %}PRODUCT | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container">
        <div id="product-detail-content">
            <div style="text-align: center; padding: 100px; font-weight: 800;">OPENING THE VAULT...</div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let productData = null;
let selectedQuantity = 1;

async function loadProduct() {
    const slug = window.location.pathname.split('/product/')[1].replace('/', '');
    try {
        const product = await API.get(`/store/products/${slug}/`);
        if (!product || product.detail) {
            document.getElementById('product-detail-content').innerHTML = `
                <div class="brutalist-card" style="padding: 100px; text-align: center;">
                    <h3 style="font-size: 3rem; margin-bottom: 20px;">NOT FOUND.</h3>
                    <p style="font-weight: 700;">THIS PIECE HAS LEFT THE COLLECTION.</p>
                    <a href="/catalog/" class="brutalist-btn" style="margin-top: 30px;">BACK TO SHOP</a>
                </div>`;
            return;
        }
        productData = product;
        document.title = `${product.name.toUpperCase()} | IRI COLLECTIONS`;
        renderProduct(product);
    } catch (err) {
        console.error(err);
    }
}

function renderProduct(p) {
    const discount = p.compare_price ? Math.round((1 - p.price / p.compare_price) * 100) : 0;
    const imgSrc = p.display_image || p.image_url || p.image || '';

    let stockText = `${p.stock} AVAILABLE`;
    let stockBg = '#fff';
    if (p.stock === 0) { stockText = 'SOLD OUT'; stockBg = '#000'; }
    else if (p.stock <= 5) { stockText = `ONLY ${p.stock} LEFT`; stockBg = 'var(--bg-accent)'; }

    const isInWishlist = window.wishlistItems ? window.wishlistItems.has(p.id) : false;
    const heartIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="${isInWishlist ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`;

    document.getElementById('product-detail-content').innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xl); align-items: start;">
            <!-- 🖼️ IMAGE -->
            <div class="brutalist-card" style="padding: 0; overflow: hidden; background: #fff;">
                <img src="${imgSrc}" alt="${p.name}" style="width: 100%; display: block;">
            </div>

            <!-- 📝 INFO -->
            <div class="hero-text">
                <div style="font-weight: 800; font-size: 0.9rem; margin-bottom: 15px; display: flex; gap: 10px; align-items: center;">
                    <span style="color: #666;">COLLECTION / ${p.category_name.toUpperCase()}</span>
                    <span class="brutalist-card" style="padding: 2px 8px; background: var(--bg-accent); font-size: 0.7rem; box-shadow: 2px 2px 0 0 #000;">DIRECTLY SOURCED</span>
                </div>
                <h1 style="font-size: 4rem; margin-bottom: 20px;">${p.name}</h1>
                
                <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 30px;">
                    <div style="font-family: var(--font-display); font-weight: 800; font-size: 3rem;">${formatPrice(p.price)}</div>
                    ${p.compare_price ? `<div style="text-decoration: line-through; font-weight: 700; color: #999;">${formatPrice(p.compare_price)}</div>` : ''}
                    <div class="brutalist-card" style="background: ${stockBg}; color: ${p.stock === 0 ? '#fff' : '#000'}; padding: 5px 15px; font-weight: 800; font-size: 0.8rem; box-shadow: var(--shadow-offset) var(--shadow-offset) 0 0 #000;">
                        ${stockText}
                    </div>
                </div>

                <p style="font-size: 1.1rem; margin-bottom: 30px; padding: 20px; border-left: var(--border-width) solid #000; background: var(--bg-secondary);">
                    ${p.description}
                </p>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; font-weight: 700;">
                    <div class="brutalist-card" style="padding: 15px; box-shadow: var(--shadow-offset) var(--shadow-offset) 0 0 #000;">MATERIAL: ${p.material || 'N/A'}</div>
                    <div class="brutalist-card" style="padding: 15px; box-shadow: var(--shadow-offset) var(--shadow-offset) 0 0 #000;">WEIGHT: ${p.weight || 'N/A'}</div>
                </div>

                <!-- 🛒 ACTIONS -->
                ${p.stock > 0 ? `
                <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                    <div style="display: flex; border: 4px solid #000; background: #fff; box-shadow: 4px 4px 0 0 #000;">
                        <button onclick="changeQty(-1)" style="padding: 10px 20px; font-weight: 800; background: #fff; border:none; cursor:pointer;">-</button>
                        <input type="number" id="qty-input" value="1" readonly style="width: 60px; text-align: center; border:none; border-left: 4px solid #000; border-right: 4px solid #000; font-weight: 800; font-size: 1.2rem;">
                        <button onclick="changeQty(1)" style="padding: 10px 20px; font-weight: 800; background: #fff; border:none; cursor:pointer;">+</button>
                    </div>
                    <button class="brutalist-btn" onclick="addToCartDetail()" style="flex: 1; font-size: 1.2rem;">ADD TO CART</button>
                    <button class="brutalist-btn" onclick="toggleWishlist(${p.id})" id="btn-wishlist-${p.id}" style="background: #fff; width: 60px;">${heartIcon}</button>
                </div>
                <button class="brutalist-btn" onclick="buyNow()" style="width: 100%; background: #000; color: #fff; font-size: 1.2rem; margin-bottom: 40px;">SECURE NOW (BUY NOW)</button>
                ` : `
                <button class="brutalist-btn" disabled style="width: 100%; background: #999; color: #fff; cursor: not-allowed; margin-bottom: 40px;">PIECE SOLD OUT</button>
                `}

                <!-- 📜 POLICY -->
                <div class="brutalist-card" style="background: var(--bg-accent); padding: 25px;">
                    <div style="font-weight: 800; text-decoration: underline; margin-bottom: 10px;">STRICT POLICY</div>
                    <p style="font-weight: 700; font-size: 0.9rem; line-height: 1.4;">
                        WE DO NOT ACCEPT RETURNS, REFUNDS, OR EXCHANGES. ALL SALES ARE FINAL. BY PURCHASING, YOU AGREE TO THESE TERMS.
                    </p>
                </div>
            </div>
        </div>
    `;
}

function changeQty(delta) {
    const inp = document.getElementById('qty-input');
    if(!inp) return;
    let val = parseInt(inp.value) + delta;
    if (val < 1) val = 1;
    if (val > productData.stock) val = productData.stock;
    inp.value = val;
    selectedQuantity = val;
}

async function addToCartDetail() {
    await addToCart(productData.id, selectedQuantity);
}

async function buyNow() {
    if (!API.isLoggedIn()) {
        Toast.info('PLEASE LOGIN TO PURCHASE');
        setTimeout(() => window.location.href = '/login/', 1000);
        return;
    }
    await addToCart(productData.id, selectedQuantity);
    window.location.href = '/cart/';
}

document.addEventListener('DOMContentLoaded', loadProduct);
</script>
{% endblock %}
