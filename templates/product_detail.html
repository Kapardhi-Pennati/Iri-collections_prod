{% extends 'base.html' %}
{% load static %}

{% block title %}PRODUCT | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container">
        <div id="product-detail-content">
            <div style="text-align: center; padding: 80px; font-weight: 600; color: var(--text-muted); font-family: var(--font-mono);">OPENING THE VAULT...</div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let productData = null;
let selectedQuantity = 1;

async function loadProduct() {
    const slug = window.location.pathname.split('/product/')[1].replace('/', '');
    try {
        const product = await API.get(`/store/products/${slug}/`);
        if (!product || product.detail) {
            document.getElementById('product-detail-content').innerHTML = `
                <div class="util-card util-card--static" style="padding: 80px; text-align: center;">
                    <svg class="icon-svg" style="width: 40px; height: 40px; color: var(--text-muted); margin-bottom: var(--space-md);"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="m15 8-6 6"/></svg>
                    <h3 style="font-size: 2rem; margin-bottom: 8px;">NOT FOUND</h3>
                    <p style="font-weight: 500; color: var(--text-muted); margin-bottom: var(--space-md);">This piece has left the collection.</p>
                    <a href="/catalog/" class="btn-brutalist">BACK TO SHOP</a>
                </div>`;
            return;
        }
        productData = product;
        document.title = `${product.name.toUpperCase()} | IRI COLLECTIONS`;
        renderProduct(product);
    } catch (err) {
        console.error(err);
    }
}

function renderProduct(p) {
    const discount = p.compare_price ? Math.round((1 - p.price / p.compare_price) * 100) : 0;
    let imgSrc = p.display_image || p.image_url || p.image || '';
    if (imgSrc === 'undefined' || imgSrc === 'null') imgSrc = '';

    let stockText = `${p.stock} AVAILABLE`;
    let stockStyle = 'background: var(--gray-200);';
    if (p.stock === 0) { stockText = 'SOLD OUT'; stockStyle = 'background: var(--black); color: var(--white);'; }
    else if (p.stock <= 5) { stockText = `ONLY ${p.stock} LEFT`; stockStyle = 'background: var(--gray-200);'; }

    document.getElementById('product-detail-content').innerHTML = `
        <div class="product-detail-grid">
            <!-- IMAGE -->
            <div class="util-card util-card--static" style="padding: 0; overflow: hidden; background: var(--gray-100);">
                <img src="${imgSrc}" alt="${p.name}" style="width: 100%; display: block;">
            </div>

            <!-- INFO -->
            <div>
                <div style="font-weight: 600; font-size: 0.8rem; margin-bottom: var(--space-sm); display: flex; gap: 8px; align-items: center; color: var(--text-muted);">
                    <span>COLLECTION / ${p.category_name.toUpperCase()}</span>
                    <span class="badge" style="background: var(--black); color: var(--white);">DIRECTLY SOURCED</span>
                </div>
                <h1 style="font-size: clamp(2rem, 5vw, 3rem); margin-bottom: var(--space-md);">${p.name}</h1>

                <div style="display: flex; gap: var(--space-md); align-items: center; margin-bottom: var(--space-lg); flex-wrap: wrap;">
                    <div class="product-price" style="font-size: 2.2rem;">${formatPrice(p.price)}</div>
                    ${p.compare_price ? `<div style="text-decoration: line-through; font-weight: 500; color: var(--text-muted); font-size: 1.1rem;">${formatPrice(p.compare_price)}</div>` : ''}
                    <div class="badge" style="${stockStyle}">${stockText}</div>
                </div>

                <div style="font-size: 0.95rem; margin-bottom: var(--space-lg); padding: var(--space-md); border-left: 3px solid var(--black); background: var(--gray-50); color: var(--text-secondary); line-height: 1.7;">
                    ${p.description}
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--space-sm); margin-bottom: var(--space-lg);">
                    <div class="util-card" style="padding: 14px; font-weight: 600; font-size: 0.85rem;">
                        <span style="color: var(--text-muted); font-size: 0.7rem; display: block; margin-bottom: 2px; font-family: var(--font-mono);">MATERIAL</span>
                        ${p.material || 'N/A'}
                    </div>
                    <div class="util-card" style="padding: 14px; font-weight: 600; font-size: 0.85rem;">
                        <span style="color: var(--text-muted); font-size: 0.7rem; display: block; margin-bottom: 2px; font-family: var(--font-mono);">WEIGHT</span>
                        ${p.weight || 'N/A'}
                    </div>
                </div>

                <!-- ACTIONS -->
                ${p.stock > 0 ? `
                <div style="display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-md);">
                    <div style="display: flex; border: var(--border-width) solid var(--border-color); box-shadow: var(--shadow-hard);">
                        <button onclick="changeQty(-1)" class="btn-brutalist" style="padding: 10px 16px; box-shadow: none; border: none; border-right: var(--border-width) solid var(--border-color); min-height: auto;">−</button>
                        <input type="number" id="qty-input" value="1" readonly style="width: 50px; text-align: center; border: none; font-weight: 700; font-size: 1rem; font-family: var(--font-mono); background: var(--white);">
                        <button onclick="changeQty(1)" class="btn-brutalist" style="padding: 10px 16px; box-shadow: none; border: none; border-left: var(--border-width) solid var(--border-color); min-height: auto;">+</button>
                    </div>
                    <button class="btn-brutalist" onclick="addToCartDetail()" style="flex: 1;">
                        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                        ADD TO CART
                    </button>
                    <button class="btn-brutalist" onclick="toggleWishlist(${p.id})" id="btn-wishlist-${p.id}" style="width: 48px; padding: 0;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></button>
                </div>
                <button class="btn-brutalist btn-primary" onclick="buyNow()" style="width: 100%; margin-bottom: var(--space-lg);">
                    BUY NOW
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
                ` : `
                <button class="btn-brutalist" disabled style="width: 100%; margin-bottom: var(--space-lg);">PIECE SOLD OUT</button>
                `}

                <!-- POLICY -->
                <div class="util-card util-card--static" style="background: var(--gray-100); padding: var(--space-md);">
                    <div style="font-weight: 700; font-size: 0.8rem; margin-bottom: 6px; letter-spacing: 0.06em;">STRICT POLICY</div>
                    <p style="font-weight: 500; font-size: 0.85rem; line-height: 1.6; color: var(--text-secondary);">
                        We do not accept returns, refunds, or exchanges. No product guarantees. No warranties. All sales are final.
                    </p>
                </div>
            </div>
        </div>
    `;
}

function changeQty(delta) {
    const inp = document.getElementById('qty-input');
    if(!inp) return;
    let val = parseInt(inp.value) + delta;
    if (val < 1) val = 1;
    if (val > productData.stock) val = productData.stock;
    inp.value = val;
    selectedQuantity = val;
}

async function addToCartDetail() {
    await addToCart(productData.id, selectedQuantity);
}

async function buyNow() {
    if (!API.isLoggedIn()) {
        Toast.info('PLEASE LOGIN TO PURCHASE');
        setTimeout(() => window.location.href = '/login/', 1000);
        return;
    }
    await addToCart(productData.id, selectedQuantity);
    window.location.href = '/cart/';
}

document.addEventListener('DOMContentLoaded', loadProduct);
</script>
{% endblock %}
