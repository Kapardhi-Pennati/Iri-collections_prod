{% extends 'base.html' %}
{% load static %}

{% block title %}CATALOG | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container">
        <!-- 🏷️ HEADER -->
        <div style="margin-bottom: 50px; border-bottom: var(--border-width) solid #000; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px;">
            <h1 style="font-size: 4rem; margin: 0;">SOURCED COLLECTIONS</h1>
            <div id="results-count" style="font-weight: 800; font-size: 1rem;">COLLECTING PIECES...</div>
        </div>

        <!-- 🔍 FILTERS BAR -->
        <div style="display: grid; grid-template-columns: 1fr auto; gap: 20px; margin-bottom: 50px; align-items: start;">
            <!-- Category Chips -->
            <div id="category-filters" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="brutalist-btn category-chip active" data-category="" style="background: #000; color: #fff; box-shadow: 2px 2px 0 0 #000;">ALL</button>
            </div>
            
            <!-- Search & Sort -->
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <input type="text" id="search-input" class="brutalist-input" placeholder="SEARCH PIECES..." style="width: 250px; box-shadow: 3px 3px 0 0 #000;">
                <select id="sort-select" class="brutalist-input" style="width: 200px; box-shadow: 3px 3px 0 0 #000; appearance: none; cursor: pointer;">
                    <option value="">SORT BY</option>
                    <option value="price_low">PRICE: LOW TO HIGH</option>
                    <option value="price_high">PRICE: HIGH TO LOW</option>
                    <option value="newest">NEWEST DROPS</option>
                </select>
            </div>
        </div>

        <!-- 📦 PRODUCTS GRID -->
        <div class="product-grid" id="products-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 100px; font-weight: 800; font-size: 1.5rem;">FETCHING THE DROP...</div>
        </div>

        <!-- 📑 PAGINATION -->
        <div id="pagination" style="display: flex; gap: 15px; justify-content: center; margin-top: 50px;"></div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let currentCategory = '';
let currentSearch = '';
let currentSort = '';
let currentPage = 1;

async function loadProducts(page = 1) {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; font-weight: 800;">RELOADING...</div>';

    let url = `/store/products/?page=${page}`;
    if (currentCategory) url += `&category=${currentCategory}`;
    if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
    if (currentSort) url += `&sort=${currentSort}`;

    try {
        const data = await API.get(url);
        document.getElementById('results-count').textContent = `${data.count || 0} PIECES FOUND`;
        
        if (data && data.results && data.results.length > 0) {
            grid.innerHTML = data.results.map(p => productCardHTML(p)).join('');
            initLazyLoading();
            renderPagination(data);
        } else {
            grid.innerHTML = `
                <div class="brutalist-card" style="grid-column: 1/-1; padding: 80px; text-align: center;">
                    <h3 style="font-size: 2rem; margin-bottom: 10px;">EMPTY VAULT.</h3>
                    <p style="font-weight: 700;">WE COULDN'T FIND ANY PIECES MATCHING YOUR CRITERIA.</p>
                    <button class="brutalist-btn" onclick="window.location.reload()" style="margin-top: 20px;">RESET FILTERS</button>
                </div>
            `;
            document.getElementById('pagination').innerHTML = '';
        }
    } catch (err) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; font-weight: 800; color: var(--error);">SYSTEM ERROR. FAILED TO LOAD PRODUCTS.</div>';
    }
}

function renderPagination(data) {
    const pag = document.getElementById('pagination');
    if (!data.next && !data.previous) { pag.innerHTML = ''; return; }

    let html = '';
    if (data.previous) {
        html += `<button class="brutalist-btn" onclick="loadProducts(${currentPage - 1}); currentPage--; scrollTo(0,0);" style="background:#fff;">← PREV</button>`;
    }
    html += `<span class="brutalist-card" style="padding: 10px 20px; font-weight: 800; background: var(--bg-accent);">PAGE ${currentPage}</span>`;
    if (data.next) {
        html += `<button class="brutalist-btn" onclick="loadProducts(${currentPage + 1}); currentPage++; scrollTo(0,0);" style="background:#fff;">NEXT →</button>`;
    }
    pag.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('category')) currentCategory = params.get('category');

    try {
        const cats = await API.get('/store/categories/');
        const filters = document.getElementById('category-filters');
        if (cats) {
            cats.forEach(cat => {
                const isActive = currentCategory === cat.slug;
                const chip = document.createElement('button');
                chip.className = 'brutalist-btn category-chip' + (isActive ? ' active' : '');
                chip.style.background = isActive ? '#000' : '#fff';
                chip.style.color = isActive ? '#fff' : '#000';
                chip.style.boxShadow = '2px 2px 0 0 #000';
                chip.dataset.category = cat.slug;
                chip.textContent = cat.name.toUpperCase();
                filters.appendChild(chip);
                if (isActive) filters.querySelector('[data-category=""]').style.background = '#fff';
                if (isActive) filters.querySelector('[data-category=""]').style.color = '#000';
            });
        }
    } catch {}

    document.getElementById('category-filters').addEventListener('click', (e) => {
        if (!e.target.classList.contains('category-chip')) return;
        document.querySelectorAll('.category-chip').forEach(c => {
            c.style.background = '#fff';
            c.style.color = '#000';
            c.classList.remove('active');
        });
        e.target.classList.add('active');
        e.target.style.background = '#000';
        e.target.style.color = '#fff';
        currentCategory = e.target.dataset.category;
        currentPage = 1;
        loadProducts(1);
    });

    let searchTimer;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            currentSearch = e.target.value;
            currentPage = 1;
            loadProducts(1);
        }, 400);
    });

    document.getElementById('sort-select').addEventListener('change', (e) => {
        currentSort = e.target.value;
        currentPage = 1;
        loadProducts(1);
    });

    loadProducts(1);
});
</script>
{% endblock %}
