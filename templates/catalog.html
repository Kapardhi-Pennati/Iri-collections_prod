{% extends 'base.html' %}
{% load static %}

{% block title %}CATALOG | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container">
        <!-- HEADER -->
        <div class="page-header"
            style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: var(--space-md);">
            <h1>CATALOG</h1>
            <div id="results-count" style="font-weight: 600; font-size: 0.85rem; color: var(--text-muted);">LOADING
                PRODUCTS...</div>
        </div>

        <!-- FILTERS -->
        <div class="filter-grid">
            <!-- Category Chips -->
            <div id="category-filters" style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn-brutalist btn-primary category-chip active" data-category=""
                    style="padding: 6px 14px; font-size: 0.75rem;">ALL</button>
            </div>

            <!-- Search & Sort -->
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <input type="text" id="search-input" class="brutalist-input" placeholder="Search products..." style="width: 220px;">
                <select id="sort-select" class="brutalist-input"
                    style="width: 190px; box-shadow: 2px 2px 0 0 var(--shadow-color); appearance: none; cursor: pointer;">
                    <option value="">SORT BY</option>
                    <option value="price_low">PRICE: LOW TO HIGH</option>
                    <option value="price_high">PRICE: HIGH TO LOW</option>
                    <option value="newest">NEWEST PRODUCTS</option>
                </select>
            </div>
        </div>

        <!-- PRODUCTS GRID -->
        <div class="product-grid" id="products-grid">
            <div
                style="grid-column: 1/-1; text-align: center; padding: 80px; font-weight: 600; color: var(--text-muted);">
                LOADING PRODUCTS...</div>
        </div>

        <!-- PAGINATION -->
        <div id="pagination" style="display: flex; gap: 12px; justify-content: center; margin-top: var(--space-xl);">
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    let currentCategory = '';
    let currentSearch = '';
    let currentSort = '';
    let currentPage = 1;
    let lastRequestKey = '';
    const MIN_SEARCH_LENGTH = 2;

    async function loadProducts(page = 1) {
        const requestKey = `${page}|${currentCategory}|${currentSearch}|${currentSort}`;
        if (requestKey === lastRequestKey) return;
        lastRequestKey = requestKey;

        const grid = document.getElementById('products-grid');
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 80px; font-weight: 600; color: var(--text-muted);">RELOADING...</div>';

        let url = `/store/products/?page=${page}`;
        if (currentCategory) url += `&category=${currentCategory}`;
        if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
        if (currentSort) url += `&sort=${currentSort}`;

        try {
            const data = await API.get(url);
            document.getElementById('results-count').textContent = `${data.count || 0} PRODUCTS FOUND`;

            if (data && data.results && data.results.length > 0) {
                // When viewing ALL products with default sorting, shuffle the results
                if (!currentCategory && !currentSort && !currentSearch) {
                    // Fisher-Yates shuffle for true randomization
                    let arr = data.results;
                    for (let i = arr.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [arr[i], arr[j]] = [arr[j], arr[i]];
                    }
                }
                grid.innerHTML = data.results.map(p => productCardHTML(p)).join('');
                initLazyLoading();
                renderPagination(data);
            } else {
                grid.innerHTML = `
                <div class="util-card" style="grid-column: 1/-1; padding: 60px; text-align: center;">
                    <h3 style="font-size: 1.5rem; margin-bottom: 8px;">NO PRODUCTS FOUND.</h3>
                    <p style="font-weight: 500; color: var(--text-muted);">No products match your current filters.</p>
                    <button class="btn-brutalist" onclick="window.location.reload()" style="margin-top: var(--space-md);">RESET FILTERS</button>
                </div>
            `;
                document.getElementById('pagination').innerHTML = '';
            }
        } catch (err) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; font-weight: 600; color: var(--error);">SYSTEM ERROR. FAILED TO LOAD PRODUCTS.</div>';
        }
    }

    function renderPagination(data) {
        const pag = document.getElementById('pagination');
        if (!data.next && !data.previous) { pag.innerHTML = ''; return; }

        let html = '';
        if (data.previous) {
            html += `<button class="btn-brutalist" onclick="loadProducts(${currentPage - 1}); currentPage--; scrollTo(0,0);" style="padding: 8px 16px; font-size: 0.8rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            PREV
        </button>`;
        }
        html += `<span class="util-card" style="padding: 8px 18px; font-weight: 700; font-size: 0.8rem; background: var(--gray-100);">PAGE ${currentPage}</span>`;
        if (data.next) {
            html += `<button class="btn-brutalist" onclick="loadProducts(${currentPage + 1}); currentPage++; scrollTo(0,0);" style="padding: 8px 16px; font-size: 0.8rem;">
            NEXT
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>`;
        }
        pag.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('category')) currentCategory = params.get('category');

        try {
            const cats = await API.get('/store/categories/');
            const filters = document.getElementById('category-filters');
            if (cats) {
                cats.forEach(cat => {
                    const isActive = currentCategory === cat.slug;
                    const chip = document.createElement('button');
                    chip.className = 'btn-brutalist category-chip' + (isActive ? ' active' : '');
                    chip.style.background = isActive ? 'var(--text-primary)' : 'var(--bg-elevated)';
                    chip.style.color = isActive ? 'var(--text-inverted)' : 'var(--text-primary)';
                    chip.style.boxShadow = '2px 2px 0 0 var(--shadow-color)';
                    chip.style.padding = '6px 14px';
                    chip.style.fontSize = '0.75rem';
                    chip.dataset.category = cat.slug;
                    chip.textContent = cat.name.toUpperCase();
                    filters.appendChild(chip);
                    if (isActive) {
                        filters.querySelector('[data-category=""]').style.background = 'var(--bg-elevated)';
                        filters.querySelector('[data-category=""]').style.color = 'var(--text-primary)';
                    }
                });
            }
        } catch { }

        document.getElementById('category-filters').addEventListener('click', (e) => {
            if (!e.target.classList.contains('category-chip')) return;
            document.querySelectorAll('.category-chip').forEach(c => {
                c.style.background = 'var(--bg-elevated)';
                c.style.color = 'var(--text-primary)';
                c.classList.remove('active');
            });
            e.target.classList.add('active');
            e.target.style.background = 'var(--text-primary)';
            e.target.style.color = 'var(--text-inverted)';
            currentCategory = e.target.dataset.category;
            currentSearch = ''; // Clear search when changing category
            searchInput.value = ''; // Sync input field
            currentPage = 1;
            lastRequestKey = '';
            loadProducts(1);
        });

        let searchTimer;
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            const value = e.target.value.trim();
            searchTimer = setTimeout(() => {
                if (currentSearch === value) return;
                currentSearch = value;
                currentPage = 1;
                lastRequestKey = '';
                loadProducts(1);
            }, 150);
        });

        document.getElementById('sort-select').addEventListener('change', (e) => {
            currentSort = e.target.value;
            currentSearch = ''; // Clear search when changing sort
            searchInput.value = ''; // Sync input field
            currentPage = 1;
            lastRequestKey = '';
            loadProducts(1);
        });

        loadProducts(1);
    });
</script>
{% endblock %}
