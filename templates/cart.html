{% extends 'base.html' %}

{% block title %}Your Cart — Iri Collections{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="section-header">
            <h1 style="font-family: var(--font-display); font-size: 2.2rem;">Shopping <span
                    class="text-gold">Cart</span></h1>
            <div class="section-divider"></div>
        </div>

        <div id="cart-content">
            <div class="page-loader">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let cartState = null;
let cartMutationInFlight = false;

function cartContainer() {
    return document.getElementById('cart-content');
}

function cloneCartState(state) {
    return state ? JSON.parse(JSON.stringify(state)) : null;
}

function renderLoginRequired() {
    cartContainer().innerHTML = `
        <div class="empty-state">
            <div class="empty-state-icon"><i class="ph ph-shopping-cart"></i></div>
            <h3>Your cart is waiting</h3>
            <p>Please <a href="/login/">sign in</a> to view your cart</p>
        </div>
    `;
}

function renderCart(cart) {
    cartState = cart;
    if (!cart || !cart.items || cart.items.length === 0) {
        cartContainer().innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon"><i class="ph ph-shopping-cart-simple"></i></div>
                <h3>Your cart is empty</h3>
                <p>Discover our beautiful jewelry collection and find something special.</p>
                <a href="/catalog/" class="btn btn-primary mt-2"><i class="ph ph-magnifying-glass"></i> Start Shopping</a>
            </div>
        `;
        return;
    }

    const itemsHTML = cart.items.map((item) => {
        const product = item.product_detail;
        const image = product.display_image || product.image_url || product.image || '';
        const outOfStock = item.is_out_of_stock;
        const opacity = outOfStock ? '0.5' : '1';
        const priceDisplay = outOfStock
            ? '<span style="color:red;font-weight:bold;">Out of Stock</span>'
            : formatPrice(product.price);
        const subtotalDisplay = outOfStock
            ? '<span style="color:var(--text-muted);">---</span>'
            : formatPrice(item.subtotal);
        const controlsDisabled = cartMutationInFlight ? 'disabled' : '';
        const qtyControl = outOfStock
            ? '<span style="color:var(--text-muted); font-size:0.8rem;">Remove to continue</span>'
            : `<div class="quantity-control" style="margin-bottom:0;">
                    <button ${controlsDisabled} onclick="updateCartItem(${item.id}, ${item.quantity - 1})"><i class="ph ph-minus"></i></button>
                    <input type="number" value="${item.quantity}" min="0" max="${product.stock}" readonly style="width:50px;">
                    <button ${controlsDisabled} onclick="updateCartItem(${item.id}, ${item.quantity + 1})"><i class="ph ph-plus"></i></button>
               </div>`;

        return `
            <div class="cart-item fade-in" data-item-id="${item.id}" style="opacity:${opacity};">
                <div class="cart-item-image">
                    <a href="/product/${product.slug}/"><img src="${image}" alt="${escapeHTML(product.name)}"></a>
                </div>
                <div class="cart-item-info" style="flex:1;">
                    <a href="/product/${product.slug}/" style="color:var(--text-primary);"><div class="cart-item-name">${escapeHTML(product.name)}</div></a>
                    <div style="color:var(--text-muted); font-size:0.85rem; margin-bottom:0.5rem;">${escapeHTML(product.material || '')}</div>
                    <div class="cart-item-price">${priceDisplay}</div>
                    <div style="display:flex; align-items:center; gap:var(--space-md); margin-top:0.75rem;">
                        ${qtyControl}
                        <span class="cart-item-remove" onclick="removeCartItem(${item.id})"><i class="ph ph-x"></i> Remove</span>
                    </div>
                </div>
                <div style="text-align:right; min-width:100px;">
                    <div style="font-weight:700; color:var(--gold-light); font-size:1.1rem;">${subtotalDisplay}</div>
                </div>
            </div>
        `;
    }).join('');

    cartContainer().innerHTML = `
        <div class="cart-layout">
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-lg);">
                    <span style="color:var(--text-secondary);">${cart.item_count} item${cart.item_count !== 1 ? 's' : ''} in your cart</span>
                    <button class="btn btn-ghost btn-sm" ${cartMutationInFlight ? 'disabled' : ''} onclick="clearCart()">Clear All</button>
                </div>
                ${itemsHTML}
            </div>
            <div class="cart-summary">
                <div class="cart-summary-card card-glass">
                    <h3 style="font-family:var(--font-display); margin-bottom:var(--space-lg);">Order Summary</h3>
                    <div class="cart-summary-row">
                        <span>Subtotal</span>
                        <span>${formatPrice(cart.total)}</span>
                    </div>
                    <div class="cart-summary-row">
                        <span>Shipping</span>
                        <span style="color:var(--text-muted); font-size: 0.9rem;">Calculated at checkout</span>
                    </div>
                    <div class="cart-summary-row total" style="margin-top: var(--space-md); border-top: 1px solid var(--border-color); padding-top: var(--space-md);">
                        <span>Total (Excl. Shipping)</span>
                        <span>${formatPrice(cart.total)}</span>
                    </div>
                    <a href="/checkout/" class="btn btn-primary btn-block btn-lg mt-2">
                        Checkout Now <i class="ph ph-arrow-right"></i>
                    </a>
                    <a href="/catalog/" class="btn btn-ghost btn-block btn-sm mt-1" style="text-transform:none;">
                        <i class="ph ph-arrow-left"></i> Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    `;
}

async function loadCart() {
    const user = await API.bootstrapUser();
    if (!user) {
        renderLoginRequired();
        return;
    }

    try {
        const controller = createRequestController();
        const cart = await API.get('/store/cart/', { signal: controller.signal });
        renderCart(cart);
    } catch {
        RouteRuntime.renderPageError(cartContainer(), 'We could not load your cart right now.');
    }
}

async function runCartMutation(optimisticMutator, requestFactory, successMessage) {
    if (!cartState || cartMutationInFlight) return;
    const snapshot = cloneCartState(cartState);
    cartMutationInFlight = true;

    if (optimisticMutator) {
        optimisticMutator(cartState);
        renderCart(cartState);
    }

    try {
        const response = await requestFactory();
        if (!response.ok) {
            throw new Error(response.data?.error || 'Cart update failed.');
        }
        renderCart(response.data);
        updateCartCount();
        if (successMessage) Toast.success(successMessage);
    } catch (error) {
        renderCart(snapshot);
        Toast.error(error.message || 'Cart update failed.');
    } finally {
        cartMutationInFlight = false;
        renderCart(cartState);
    }
}

async function updateCartItem(itemId, newQty) {
    await runCartMutation(
        (cart) => {
            const item = cart.items.find((entry) => entry.id === itemId);
            if (!item) return;
            if (newQty <= 0) {
                cart.items = cart.items.filter((entry) => entry.id !== itemId);
            } else {
                item.quantity = newQty;
                item.subtotal = item.product_detail.price * newQty;
            }
            cart.item_count = cart.items.reduce((sum, entry) => sum + entry.quantity, 0);
            cart.total = cart.items.reduce((sum, entry) => sum + Number(entry.subtotal || 0), 0);
        },
        () => API.patch('/store/cart/', { item_id: itemId, quantity: newQty }),
        null,
    );
}

async function removeCartItem(itemId) {
    await runCartMutation(
        (cart) => {
            cart.items = cart.items.filter((entry) => entry.id !== itemId);
            cart.item_count = cart.items.reduce((sum, entry) => sum + entry.quantity, 0);
            cart.total = cart.items.reduce((sum, entry) => sum + Number(entry.subtotal || 0), 0);
        },
        () => API.delete(`/store/cart/?item_id=${itemId}`),
        'Item removed',
    );
}

async function clearCart() {
    await runCartMutation(
        (cart) => {
            cart.items = [];
            cart.item_count = 0;
            cart.total = 0;
        },
        () => API.delete('/store/cart/'),
        'Cart cleared',
    );
}

document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
