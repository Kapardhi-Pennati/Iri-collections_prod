{% extends 'base.html' %}

{% block title %}CART | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container">
        <!-- HEADER -->
        <div class="page-header">
            <h1 class="brand-text">YOUR BAG</h1>
        </div>

        <div id="cart-content">
            <div style="text-align: center; padding: 80px; font-weight: 700; color: var(--gray-400); font-family: var(--font-mono);">
                SCANNING INVENTORY...
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    let cartState = null;
    let cartMutationInFlight = false;

    function cartContainer() {
        return document.getElementById('cart-content');
    }

    function renderLoginRequired() {
        cartContainer().innerHTML = `
        <div class="util-card" style="padding: 80px; text-align: center;">
            <svg class="icon-svg" style="width: 48px; height: 48px; margin-bottom: var(--space-md);"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <h3 style="font-size: 1.5rem; margin-bottom: 8px;">ACCESS DENIED</h3>
            <p style="font-weight: 500; color: var(--text-secondary); margin-bottom: var(--space-md);">AUTHENTICATION REQUIRED TO VIEW BAG.</p>
            <a href="/login/" class="btn-brutalist btn-primary">IDENTITY LOGIN</a>
        </div>
    `;
    }

    function renderCart(cart) {
        cartState = cart;
        if (!cart || !cart.items || cart.items.length === 0) {
            cartContainer().innerHTML = `
            <div class="util-card" style="padding: 80px; text-align: center;">
                <svg class="icon-svg" style="width: 48px; height: 48px; margin-bottom: var(--space-md);"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <h3 style="font-size: 1.5rem; margin-bottom: 8px;">BAG EMPTY</h3>
                <p style="font-weight: 500; color: var(--text-secondary); margin-bottom: var(--space-md);">NO PIECES IN CURRENT ALLOCATION.</p>
                <a href="/catalog/" class="btn-brutalist btn-primary">BROWSE DROPS</a>
            </div>
        `;
            return;
        }

        const itemsHTML = cart.items.map((item) => {
            const p = item.product_detail;
            const image = p.display_image || p.image_url || p.image || '';
            const outOfStock = item.is_out_of_stock;

            return `
            <div class="util-card" style="padding: var(--space-sm); margin-bottom: var(--space-md); opacity: ${outOfStock ? '0.5' : '1'}; display: grid; grid-template-columns: 120px 1fr auto; gap: var(--space-md); align-items: center;">
                <div style="border: 1px solid var(--black); aspect-ratio: 1; overflow: hidden; background: var(--bg-secondary);">
                    <img src="${image}" alt="${p.name}" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div>
                    <h3 style="font-size: 1rem; margin-bottom: 4px;">${p.name.toUpperCase()}</h3>
                    <div style="font-family: var(--font-mono); font-size: 0.7rem; color: var(--gray-400); margin-bottom: 12px;">REF: ${p.id}</div>
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <div style="display: flex; border: 2px solid var(--black);">
                            <button onclick="updateCartItem(${item.id}, ${item.quantity - 1})" style="padding: 4px 12px; font-weight: 900; border:none; background:var(--white); cursor:pointer;">−</button>
                            <span style="padding: 4px 12px; border-left: 2px solid var(--black); border-right: 2px solid var(--black); font-family: var(--font-mono); font-weight: 700;">${item.quantity}</span>
                            <button onclick="updateCartItem(${item.id}, ${item.quantity + 1})" style="padding: 4px 12px; font-weight: 900; border:none; background:var(--white); cursor:pointer;">+</button>
                        </div>
                        <button onclick="removeCartItem(${item.id})" style="font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-decoration: underline; background:none; border:none; cursor:pointer;">[ DELETE ]</button>
                    </div>
                </div>
                <div style="text-align: right;">
                    <div style="font-family: var(--font-mono); font-weight: 800; font-size: 1.1rem;">${formatPrice(item.subtotal)}</div>
                </div>
            </div>
        `;
        }).join('');

        cartContainer().innerHTML = `
        <div class="grid-2" style="align-items: start;">
            <div>
                ${itemsHTML}
                <button class="btn-brutalist" onclick="clearCart()" style="font-size: 0.7rem; margin-top: var(--space-md);">
                    <svg class="icon-svg" style="width: 14px; height: 14px;"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    PURGE ALL
                </button>
            </div>

            <div class="util-card" style="padding: var(--space-lg); position: sticky; top: 150px;">
                <h2 style="font-size: 1.2rem; margin-bottom: var(--space-md); border-bottom: 2px solid var(--black); padding-bottom: 12px;">ORDER SUMMARY</h2>
                <div style="display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 16px; font-size: 0.85rem; font-family: var(--font-mono);">
                    <span>SUBTOTAL</span>
                    <span>${formatPrice(cart.total)}</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 500; margin-bottom: 16px; font-size: 0.8rem; color: var(--gray-400); font-family: var(--font-mono);">
                    <span>LOGISTICS</span>
                    <span>CALCULATED AT STEP 2</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: 900; margin-top: var(--space-md); padding-top: var(--space-md); border-top: 2px solid var(--black);">
                    <span>TOTAL</span>
                    <span>${formatPrice(cart.total)}</span>
                </div>

                <a href="/checkout/" class="btn-brutalist btn-primary" style="width: 100%; margin-top: var(--space-lg); text-align: center;">
                    SECURE CHECKOUT
                    <svg class="icon-svg"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>

                <div style="background: var(--black); color: var(--white); padding: 12px; margin-top: var(--space-md); font-family: var(--font-mono); font-weight: 700; font-size: 0.65rem; text-align: center; letter-spacing: 0.1em;">
                    ALL SALES FINAL // NO RETURNS // NO REFUNDS
                </div>
            </div>
        </div>
    `;
    }

    async function loadCart() {
        if (!API.isLoggedIn()) { renderLoginRequired(); return; }
        try {
            const data = await API.get('/store/cart/');
            renderCart(data);
        } catch {
            cartContainer().innerHTML = '<div style="text-align: center; padding: 60px; font-weight: 600; color: var(--error);">ERROR LOADING BAG.</div>';
        }
    }

    async function updateCartItem(itemId, newQty) {
        if (cartMutationInFlight) return;
        cartMutationInFlight = true;
        try {
            const res = await API.patch('/store/cart/', { item_id: itemId, quantity: newQty });
            if (res.ok) { renderCart(res.data); updateCartCount(); }
        } finally { cartMutationInFlight = false; }
    }

    async function removeCartItem(itemId) {
        if (cartMutationInFlight) return;
        cartMutationInFlight = true;
        try {
            const res = await API.delete(`/store/cart/?item_id=${itemId}`);
            if (res.ok) { renderCart(res.data); updateCartCount(); Toast.success('PIECE REMOVED'); }
        } finally { cartMutationInFlight = false; }
    }

    async function clearCart() {
        if (!confirm('CLEAR ALL PIECES?')) return;
        const res = await API.delete('/store/cart/');
        if (res.ok) { renderCart(res.data); updateCartCount(); Toast.success('BAG CLEARED'); }
    }

    document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
