{% extends 'base.html' %}

{% block title %}Your Cart — Iri Collections{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="section-header">
            <h1 style="font-family: var(--font-display); font-size: 2.2rem;">Shopping <span
                    class="text-gold">Cart</span></h1>
            <div class="section-divider"></div>
        </div>

        <div id="cart-content">
            <div class="page-loader">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    async function loadCart() {
        if (!API.isLoggedIn()) {
            document.getElementById('cart-content').innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon"><i class="ph ph-shopping-cart"></i></div>
                <h3>Your cart is waiting</h3>
                <p>Please <a href="/login/">sign in</a> to view your cart</p>
            </div>`;
            return;
        }

        try {
            const cart = await API.get('/store/cart/');
            renderCart(cart);
        } catch (err) {
            console.error(err);
        }
    }

    function renderCart(cart) {
        if (!cart || !cart.items || cart.items.length === 0) {
            document.getElementById('cart-content').innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon"><i class="ph ph-shopping-cart"></i></div>
                <h3>Your cart is empty</h3>
                <p>Discover our beautiful jewelry collection</p>
                <a href="/catalog/" class="btn btn-primary mt-2">Start Shopping</a>
            </div>`;
            return;
        }

        const itemsHTML = cart.items.map(item => {
            const p = item.product_detail;
            const img = p.display_image || p.image_url || p.image || '';
            const oos = item.is_out_of_stock;
            const opacity = oos ? '0.5' : '1';
            const priceDisplay = oos ? '<span style="color:red;font-weight:bold;">Out of Stock</span>' : formatPrice(p.price);
            const subtotalDisplay = oos ? '<span style="color:var(--text-muted);">---</span>' : formatPrice(item.subtotal);
            const qtyControl = oos ? 
                `<span style="color:var(--text-muted); font-size:0.8rem;">Remove to continue</span>` :
                `<div class="quantity-control" style="margin-bottom:0;">
                    <button onclick="updateCartItem(${item.id}, ${item.quantity - 1})"><i class="ph ph-minus"></i></button>
                    <input type="number" value="${item.quantity}" min="0" max="${p.stock}" readonly style="width:50px;">
                    <button onclick="updateCartItem(${item.id}, ${item.quantity + 1})"><i class="ph ph-plus"></i></button>
                </div>`;

            return `
            <div class="cart-item fade-in" data-item-id="${item.id}" style="opacity:${opacity};">
                <div class="cart-item-image">
                    <a href="/product/${p.slug}/"><img src="${img}" alt="${p.name}"></a>
                </div>
                <div class="cart-item-info" style="flex:1;">
                    <a href="/product/${p.slug}/" style="color:var(--text-primary);"><div class="cart-item-name">${p.name}</div></a>
                    <div style="color:var(--text-muted); font-size:0.85rem; margin-bottom:0.5rem;">${p.material || ''}</div>
                    <div class="cart-item-price">${priceDisplay}</div>
                    <div style="display:flex; align-items:center; gap:var(--space-md); margin-top:0.75rem;">
                        ${qtyControl}
                        <span class="cart-item-remove" onclick="removeCartItem(${item.id})"><i class="ph ph-x"></i> Remove</span>
                    </div>
                </div>
                <div style="text-align:right; min-width:100px;">
                    <div style="font-weight:700; color:var(--gold-light); font-size:1.1rem;">${subtotalDisplay}</div>
                </div>
            </div>`;
        }).join('');

        document.getElementById('cart-content').innerHTML = `
        <div class="cart-layout">
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-lg);">
                    <span style="color:var(--text-secondary);">${cart.item_count} item${cart.item_count !== 1 ? 's' : ''} in your cart</span>
                    <button class="btn btn-ghost btn-sm" onclick="clearCart()">Clear All</button>
                </div>
                ${itemsHTML}
            </div>
            <div class="cart-summary">
                <div class="cart-summary-card card-glass">
                    <h3 style="font-family:var(--font-display); margin-bottom:var(--space-lg);">Order Summary</h3>
                    <div class="cart-summary-row">
                        <span>Subtotal</span>
                        <span>${formatPrice(cart.total)}</span>
                    </div>
                
                    <div class="cart-summary-row">
                        <span>Shipping</span>
                        <span style="color:var(--success);">${cart.total >= 1500 ? 'Free' : formatPrice(80)}</span>
                    </div>
                    <div class="cart-summary-row total">
                        <span>Total</span>
                        <span>${formatPrice(cart.total >= 1500 ? cart.total : cart.total + 80)}</span>
                    </div>
                    ${cart.total < 1500 ? `<p style="font-size:0.8rem; color:var(--text-muted); margin-top:var(--space-sm);">Add ${formatPrice(1500 - cart.total)} more for free shipping</p>` : ''}
                    <a href="/checkout/" class="btn btn-primary btn-block btn-lg mt-2">Proceed to Checkout</a>
                    <a href="/catalog/" class="btn btn-ghost btn-block btn-sm mt-1" style="text-transform:none;"><i class="ph ph-arrow-left"></i> Continue Shopping</a>
                </div>
            </div>
        </div>`;
    }

    async function updateCartItem(itemId, newQty) {
        const res = await API.patch('/store/cart/', { item_id: itemId, quantity: newQty });
        if (res && res.ok) {
            renderCart(res.data);
            updateCartCount();
        } else {
            Toast.error(res?.data?.error || 'Failed to update');
        }
    }

    async function removeCartItem(itemId) {
        const res = await API.delete(`/store/cart/?item_id=${itemId}`);
        if (res && res.ok) {
            Toast.success('Item removed');
            renderCart(res.data);
            updateCartCount();
        }
    }

    async function clearCart() {
        const res = await API.delete('/store/cart/');
        if (res && res.ok) {
            Toast.success('Cart cleared');
            renderCart(res.data);
            updateCartCount();
        }
    }

    document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
