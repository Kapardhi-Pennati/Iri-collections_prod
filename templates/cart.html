{% extends 'base.html' %}

{% block title %}CART | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container">
        <!-- 🛒 HEADER -->
        <div style="margin-bottom: 50px; border-bottom: var(--border-width) solid #000; padding-bottom: 20px;">
            <h1 style="font-size: 3.5rem; margin: 0;">ORDER MANIFEST</h1>
        </div>

        <div id="cart-content">
            <div style="text-align: center; padding: 100px; font-weight: 800;">OPENING YOUR BAG...</div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
let cartState = null;
let cartMutationInFlight = false;

function cartContainer() {
    return document.getElementById('cart-content');
}

function renderLoginRequired() {
    cartContainer().innerHTML = `
        <div class="brutalist-card" style="padding: 100px; text-align: center;">
            <h3 style="font-size: 2.5rem; margin-bottom: 20px;">ACCESS DENIED.</h3>
            <p style="font-weight: 700;">PLEASE SIGN IN TO VIEW YOUR BAG.</p>
            <a href="/login/" class="brutalist-btn" style="margin-top: 30px;">LOGIN NOW</a>
        </div>
    `;
}

function renderCart(cart) {
    cartState = cart;
    if (!cart || !cart.items || cart.items.length === 0) {
        cartContainer().innerHTML = `
            <div class="brutalist-card" style="padding: 100px; text-align: center;">
                <h3 style="font-size: 2.5rem; margin-bottom: 20px;">BAG IS EMPTY.</h3>
                <p style="font-weight: 700;">YOUR VAULT IS CURRENTLY EMPTY. FIND YOUR NEXT PIECE.</p>
                <a href="/catalog/" class="brutalist-btn" style="margin-top: 30px;">START SHOPPING</a>
            </div>
        `;
        return;
    }

    const itemsHTML = cart.items.map((item) => {
        const p = item.product_detail;
        const image = p.display_image || p.image_url || p.image || '';
        const outOfStock = item.is_out_of_stock;
        
        return `
            <div class="brutalist-card" style="display: grid; grid-template-columns: 120px 1fr auto; gap: 20px; padding: 15px; margin-bottom: 20px; opacity: ${outOfStock ? '0.5' : '1'};">
                <div style="border: 2px solid #000; overflow: hidden; background: #fff;">
                    <img src="${image}" alt="${p.name}" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div>
                    <h3 style="font-size: 1.2rem; margin-bottom: 5px;">${p.name.toUpperCase()}</h3>
                    <div style="font-weight: 700; font-size: 0.8rem; color: #666; margin-bottom: 10px;">MATERIAL: ${p.material || 'N/A'}</div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div style="display: flex; border: 2px solid #000; background: #fff;">
                            <button onclick="updateCartItem(${item.id}, ${item.quantity - 1})" style="padding: 5px 10px; font-weight: 800; border:none; background:#fff; cursor:pointer;">-</button>
                            <span style="padding: 5px 15px; border-left: 2px solid #000; border-right: 2px solid #000; font-weight: 800;">${item.quantity}</span>
                            <button onclick="updateCartItem(${item.id}, ${item.quantity + 1})" style="padding: 5px 10px; font-weight: 800; border:none; background:#fff; cursor:pointer;">+</button>
                        </div>
                        <button onclick="removeCartItem(${item.id})" style="font-weight: 800; text-decoration: underline; background:none; border:none; cursor:pointer; font-size: 0.8rem;">REMOVE</button>
                    </div>
                </div>
                <div style="text-align: right;">
                    <div style="font-family: var(--font-display); font-weight: 800; font-size: 1.5rem;">${formatPrice(item.subtotal)}</div>
                </div>
            </div>
        `;
    }).join('');

    cartContainer().innerHTML = `
        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: var(--space-xl); align-items: start;">
            <div>
                ${itemsHTML}
                <button class="brutalist-btn" onclick="clearCart()" style="background: #fff; box-shadow: 2px 2px 0 0 #000; font-size: 0.8rem;">CLEAR ALL PIECES</button>
            </div>
            
            <div class="brutalist-card" style="padding: 30px; position: sticky; top: 150px;">
                <h2 style="font-size: 2rem; margin-bottom: 30px; border-bottom: 4px solid #000; padding-bottom: 10px;">SUMMARY</h2>
                <div style="display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 15px;">
                    <span>SUBTOTAL</span>
                    <span>${formatPrice(cart.total)}</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 15px;">
                    <span>SHIPPING</span>
                    <span style="color: #666;">CALCULATED AT CHECKOUT</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: 800; margin-top: 30px; padding-top: 20px; border-top: 4px solid #000;">
                    <span>TOTAL</span>
                    <span>${formatPrice(cart.total)}</span>
                </div>
                
                <a href="/checkout/" class="brutalist-btn" style="width: 100%; background: #000; color: #fff; margin-top: 30px; font-size: 1.2rem; text-align: center;">PROCEED TO CHECKOUT</a>
                
                <div class="brutalist-card" style="background: var(--bg-accent); padding: 15px; margin-top: 30px; font-weight: 800; font-size: 0.8rem; text-align: center;">
                    REMINDER: NO RETURNS. NO REFUNDS. ALL SALES FINAL.
                </div>
            </div>
        </div>
    `;
}

async function loadCart() {
    if (!API.isLoggedIn()) { renderLoginRequired(); return; }
    try {
        const data = await API.get('/store/cart/');
        renderCart(data);
    } catch {
        cartContainer().innerHTML = '<div style="text-align: center; padding: 50px; font-weight: 800;">ERROR LOADING BAG.</div>';
    }
}

async function updateCartItem(itemId, newQty) {
    if (cartMutationInFlight) return;
    cartMutationInFlight = true;
    try {
        const res = await API.patch('/store/cart/', { item_id: itemId, quantity: newQty });
        if (res.ok) { renderCart(res.data); updateCartCount(); }
    } finally { cartMutationInFlight = false; }
}

async function removeCartItem(itemId) {
    if (cartMutationInFlight) return;
    cartMutationInFlight = true;
    try {
        const res = await API.delete(`/store/cart/?item_id=${itemId}`);
        if (res.ok) { renderCart(res.data); updateCartCount(); Toast.success('PIECE REMOVED'); }
    } finally { cartMutationInFlight = false; }
}

async function clearCart() {
    if (!confirm('CLEAR ALL PIECES?')) return;
    const res = await API.delete('/store/cart/');
    if (res.ok) { renderCart(res.data); updateCartCount(); Toast.success('BAG CLEARED'); }
}

document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
