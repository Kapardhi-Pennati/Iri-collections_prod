{% extends 'base.html' %}
{% load static %}

{% block title %}WISHLIST | IRI COLLECTIONS{% endblock %}

{% block content %}
<section style="padding: var(--space-xl) 0;">
    <div class="container">
        <!-- 🏷️ HEADER -->
        <div style="margin-bottom: 50px; border-bottom: var(--border-width) solid #000; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;">
            <h1 style="font-size: 3.5rem; margin: 0;">SAVED</h1>
            <div id="wishlist-count-hdr" style="font-weight: 800; font-size: 1rem;">COLLECTING...</div>
        </div>

        <div id="wishlist-content">
            <div style="text-align: center; padding: 100px; font-weight: 800;">OPENING YOUR VAULT...</div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
async function loadWishlist() {
    const container = document.getElementById('wishlist-content');
    if (!API.isLoggedIn()) {
        container.innerHTML = `
            <div class="brutalist-card" style="padding: 100px; text-align: center;">
                <h3 style="font-size: 2.5rem; margin-bottom: 20px;">ACCESS DENIED.</h3>
                <p style="font-weight: 700;">PLEASE SIGN IN TO VIEW YOUR SAVED PIECES.</p>
                <a href="/login/" class="brutalist-btn" style="margin-top: 30px;">LOGIN NOW</a>
            </div>`;
        return;
    }
    try {
        const items = await API.get('/store/wishlist/');
        renderWishlist(items);
    } catch (err) {
        container.innerHTML = `<div style="text-align:center; font-weight:800;">FAILED TO LOAD VAULT.</div>`;
    }
}

function renderWishlist(items) {
    const container = document.getElementById('wishlist-content');
    document.getElementById('wishlist-count-hdr').textContent = `${items.length} PIECES SAVED`;

    if (!items || items.length === 0) {
        container.innerHTML = `
            <div class="brutalist-card" style="padding: 100px; text-align: center;">
                <h3 style="font-size: 2.5rem; margin-bottom: 20px;">VAULT IS EMPTY.</h3>
                <p style="font-weight: 700;">BROWSE OUR PIECES AND SAVE YOUR FAVORITES.</p>
                <a href="/catalog/" class="brutalist-btn" style="margin-top: 30px;">EXPLORE COLLECTION</a>
            </div>`;
        return;
    }

    container.innerHTML = `
        <div class="product-grid" id="wishlist-grid">
            ${items.map(p => productCardHTML(p)).join('')}
        </div>`;
    initLazyLoading();
}

document.addEventListener('DOMContentLoaded', loadWishlist);
</script>
{% endblock %}
